<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYBot IA - Assistente Futurista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/images/favicon.ico">
</head>
<body>

    <div class="stars-layer-1"></div>
    <div class="stars-layer-2"></div>
    <div class="stars-layer-3"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="hologram-grid"></div>

    <div class="container" id="app-container">
        
        <div class="header">
            <div class="status-indicator">
                <span class="dot"></span> Online e Operante
            </div>
            <div id="hora">00:00:00</div>
        </div>

        <div class="bot-area">
            <div class="floating-panel panel-left-top">
                <div class="panel-icon">
                    <svg viewBox="0 0 118 118" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                      <path fill="var(--primary)" d="M58.9,2.8C46.8,2.8,37.3,8.7,37.3,18.8v10.5h22.6v3.2H25.3C13.2,32.5,2.8,42.4,2.8,55.5c0,13,9.5,21.7,21.7,21.7h5.4v-9.5c0-11,8.9-19.9,19.9-19.9h19.9v-19.9C69.7,14,58.9,2.8,58.9,2.8z"/>
                      <path fill="#ffffff" d="M58.9,115.2c12.1,0,21.7-5.9,21.7-16v-10.5H58.1v-3.2h34.6c12.1,0,22.6-9.9,22.6-23c0-13-9.5-21.7-21.7-21.7h-5.4v9.5c0,11-8.9,19.9-19.9,19.9H48.4v19.9C48.4,104,58.9,115.2,58.9,115.2z"/>
                    </svg>
                </div>
                <div class="panel-info">
                    <span class="panel-label">LÓGICA</span>
                    <span class="panel-value">PYTHON</span>
                </div>
            </div>
            
            <div class="floating-panel panel-left-bottom">
                <div class="panel-icon">
                    <svg width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>
                </div>
                <div class="panel-info">
                    <span class="panel-label">INTELIGÊNCIA</span>
                    <span class="panel-value">ARTIFICIAL</span>
                </div>
            </div>

            <div id="robo-avatar" class="robo">
                
                <div class="holo-base">
                    <div class="base-ring"></div>
                    <div class="base-ring delay"></div>
                    <div class="base-center"></div>
                </div>

                <div class="robo-halo"></div>

                <div class="robo-head">
                    <div class="antenna">
                        <div class="antenna-stick"></div>
                        <div class="antenna-ball"></div>
                    </div>
                    <div class="ear left-ear"></div>
                    <div class="ear right-ear"></div>
                    <div class="face">
                        <div class="visor"></div>
                        <div class="eyes">
                            <div class="eye left-eye"></div>
                            <div class="eye right-eye"></div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                </div>

            </div>

            <div class="floating-panel panel-right-top">
                <div class="panel-icon">
                    <svg width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="2" viewBox="0 0 24 24"><path d="M8 8v8M16 8v8M4 12h16M12 4v16"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
                <div class="panel-info">
                    <span class="panel-label">CONEXÃO</span>
                    <span class="panel-value">SISTEMA</span>
                </div>
            </div>

            <div class="floating-panel panel-right-bottom">
                <div class="panel-icon">
                    <svg width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div class="panel-info">
                    <span class="panel-label">MEMÓRIA</span>
                    <span class="panel-value">DADOS</span>
                </div>
            </div>

            <div class="bot-title-area">
                <h1>PYBot</h1>
                <span class="badge">v2.0</span>
            </div>
            <div class="sub" id="system-status">
                <span class="status-ping"></span>
                <span id="status-text-content">ONLINE E OPERANTE</span>
            </div>
        </div>

        <div class="media-container" id="media-container">
            <img id="media-image" src="" alt="Mídia Contextual" style="display: none;">
            <video id="media-video" autoplay loop muted playsinline style="display: none;"></video>
        </div>

        <div id="resposta" class="response-box">
            Iniciando sistemas... Olá, eu sou o PYBot. Como posso ajudar na nossa apresentação?
        </div>

        <div class="input-area">
            <input type="text" id="texto" placeholder="Digite seu comando ou pergunta..." autocomplete="off">
            <button id="btn-enviar" type="button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

    <script src="scripts/bot.js"></script>
</body>
</html>
